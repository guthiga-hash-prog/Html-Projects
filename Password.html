<!DOCTYPE html>
<html>
<head>
    <title>Password Access</title>
</head>
<body>

<script>
let correctPassword = "7745";
let userPassword = "";
let attempts = 3;

// Loop runs while PIN is wrong and attempts remain
while (userPassword!== correctPassword && attempts > 0) {
    userPassword = prompt("Enter your Password. Attempts left: " + attempts);
    attempts--;
}

// Print result without if/else
alert(userPassword === correctPassword ? "Access granted ✅" : "Access denied ❌");
</script>

</body>
</html>
